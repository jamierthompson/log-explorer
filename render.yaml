# Render Blueprint — the site as an always-on Node web service. Render
# reads this on a Blueprint sync and provisions the service from code, so
# the hosting config lives in the repo rather than only in the dashboard.
services:
  - type: web
    name: log-explorer
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /
    autoDeploy: true
