<svg xmlns="http://www.w3.org/2000/svg" viewBox="5 5 22 22" width="32" height="32">
  <style>
    /* Magenta glyph on a transparent tile, tracking the app accent so it
       keeps contrast on both light and dark browser chrome. */
    :root { --glyph: oklch(0.485 0.18 349.8); }
    @media (prefers-color-scheme: dark) {
      :root { --glyph: oklch(0.725 0.175 349.8); }
    }
    .glyph {
      fill: none;
      stroke: var(--glyph);
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .bracket { stroke-width: 2; opacity: 0.7; }
    .chevron { stroke-width: 2.4; }
  </style>
  <g class="glyph">
    <path class="bracket" d="M10 8 H7 V24 H10" />
    <path class="bracket" d="M22 8 H25 V24 H22" />
    <path class="chevron" d="M14 11.5 L18 16 L14 20.5" />
  </g>
</svg>
